services:
  api:
    build: .
    container_name: ai-support-api
    ports:
      - "8000:8000"
    environment:
      OLLAMA_HOST: http://ollama:11434
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: noreply@example.com
    depends_on:
      - ollama
      - mailhog
    restart: unless-stopped

  ollama:
    image: alpine/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    restart: unless-stopped

volumes:
  ollama_data:
